<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clientes — Panel Corporativo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../CSS/Cliente/cliente.css">
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="display-6 text-primary">Gestión de Clientes</h1>
        <button id="btnNuevoCliente" class="btn btn-lg btn-primary" data-bs-toggle="modal" data-bs-target="#clienteModal">
            <i class="bi bi-person-plus-fill me-2"></i>Nuevo Cliente
        </button>
    </div>

    <div class="input-group mb-4 shadow-sm">
        <input type="search" id="buscarInput" class="form-control" placeholder="Buscar cliente por nombre o documento">
        <button id="btnBuscar" class="btn btn-outline-secondary">
            <i class="bi bi-search"></i>
        </button>
    </div>

    <div class="table-responsive shadow-sm rounded">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
            <tr>
                <th>N° Documento</th>
                <th>Nombre</th>
                <th>Dirección</th>
                <th>Correo</th>
                <th>Teléfono</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="clienteTableBody"></tbody>
        </table>
    </div>

    <nav class="mt-4" aria-label="Paginación de clientes">
        <ul class="pagination justify-content-center" id="paginacion"></ul>
    </nav>
</div>

<div class="modal fade" id="clienteModal" tabindex="-1" aria-labelledby="clienteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg">
            <form id="clienteForm" novalidate>
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="clienteModalLabel">Registrar Cliente</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body px-5 py-4">
                    <input type="hidden" id="id">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="documento" class="form-label">N° Documento:</label>
                            <input type="text" class="form-control" id="documento" required>
                        </div>
                        <div class="col-md-6">
                            <label for="nombre" class="form-label">Nombre / Razón Social:</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>
                        <div class="col-md-6">
                            <label for="direccion" class="form-label">Dirección:</label>
                            <input type="text" class="form-control" id="direccion" required>
                        </div>
                        <div class="col-md-6">
                            <label for="correo" class="form-label">Correo:</label>
                            <input type="email" class="form-control" id="correo" required>
                        </div>
                        <div class="col-md-6">
                            <label for="telefono" class="form-label">Teléfono:</label>
                            <input type="text" class="form-control" id="telefono" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer px-5 py-3">
                    <button type="submit" class="btn btn-success px-4">Guardar</button>
                    <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">Cancelar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../JS/cliente/cliente.js"></script>
</body>
</html>
