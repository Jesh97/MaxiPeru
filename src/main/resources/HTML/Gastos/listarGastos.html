<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Gastos - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="font-sans antialiased bg-gray-50 text-gray-800 min-h-screen flex flex-col">

<div class="flex-1 container mx-auto px-4 sm:px-6 py-10 w-full max-w-8xl">

    <h2 class="text-5xl font-extrabold text-center text-indigo-900 mb-10 pb-4 border-b-4 border-indigo-300 shadow-md bg-white p-4 rounded-xl tracking-tight">
        <i class="bi bi-cash-stack text-indigo-500 mr-3"></i> LISTADO DE GASTOS
    </h2>

    <div class="shadow-2xl rounded-2xl overflow-hidden bg-white border border-gray-200/70">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200" id="gastos-table">

                <thead class="bg-indigo-700 text-white uppercase tracking-wider text-xs sticky top-0 z-10">
                    <tr>
                        <th class="px-4 py-4 font-semibold text-center">Fecha</th>
                        <th class="px-4 py-4 font-semibold text-left">Motivo</th>
                        <th class="px-4 py-4 font-semibold text-center">Proveedor</th>
                        <th class="px-4 py-4 font-semibold text-center">Moneda</th>
                        <th class="px-4 py-4 font-semibold text-center">Subtotal</th>
                        <th class="px-4 py-4 font-semibold text-center">IGV</th>
                        <th class="px-4 py-4 font-semibold text-center">Total</th>
                        <th class="px-4 py-4 font-semibold text-center">Acciones</th>
                    </tr>
                </thead>

                <tbody id="tabla-gastos" class="bg-white divide-y divide-gray-100 text-sm"></tbody>

            </table>
        </div>
    </div>

</div>

<script src="../../JS/Gastos/listarGastos.js"></script>

</body>
</html>
