<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Registro de Gastos | Empresa Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../CSS/gastos/gastos.css">
</head>
<body class="text-[--primary]">

<header class="bg-[--header-bg] text-white py-5 shadow-2xl border-b-4 border-[--secondary]">
    <div class="w-full mx-auto px-4 sm:px-6 flex items-center">
        <div class="flex items-center space-x-3 sm:space-x-4">
            <i class="bi bi-bank text-4xl text-[--secondary]"></i>
            <h1 class="text-3xl font-black tracking-wider text-white">REGISTRO DE GASTOS</h1>
        </div>
    </div>
</header>

<main class="w-full mx-auto px-4 sm:px-6 py-10 flex-grow">
    <form id="formGasto" class="space-y-10">

        <section class="bg-[--card-bg] rounded-xl p-8 card-shadow-premium">
            <h2 class="flex items-center text-2xl font-extrabold text-[--primary] mb-6 border-b-4 border-[--secondary] pb-3">
                <i class="bi bi-file-earmark-text text-[--primary] mr-3 text-2xl"></i>Datos Generales
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-10 gap-y-6">

                <div>
                    <label class="block font-semibold text-sm text-[--muted] mb-2">Razón Social/Proveedor</label>
                    <input type="text" id="busquedaProveedor" placeholder="Buscar RUC o Nombre" class="w-full px-4 py-3 rounded-lg border input-field-premium" required value="">
                </div>

                <div>
                    <label for="fechaGasto" class="block font-semibold text-sm text-[--muted] mb-2">Fecha de Emisión</label>
                    <input type="date" id="fechaGasto" name="fecha_gasto" class="w-full px-4 py-3 rounded-lg border input-field-premium" required value="">
                </div>

                <div>
                    <label for="tipoComprobante" class="block font-semibold text-sm text-[--muted] mb-2">Tipo Comprobante</label>
                    <select id="tipoComprobante" name="tipo_comprobante" class="w-full px-4 py-3 rounded-lg border input-field-premium" required>
                        <option value="" disabled selected>Seleccione el tipo</option>
                        <option value="boleta">Boleta de Venta</option>
                        <option value="factura">Factura</option>
                        <option value="recibo">Recibo por Honorarios</option>
                    </select>
                </div>

                <div>
                    <label for="serieComprobante" class="block font-semibold text-sm text-[--muted] mb-2">Serie</label>
                    <input type="text" id="serieComprobante" name="serie_comprobante" placeholder="Ej: F001" class="w-full px-4 py-3 rounded-lg border input-field-premium" required value="">
                </div>

                <div>
                    <label for="correlativoComprobante" class="block font-semibold text-sm text-[--muted] mb-2">Correlativo</label>
                    <input type="text" id="correlativoComprobante" name="correlativo_comprobante" placeholder="Ej: 123456" class="w-full px-4 py-3 rounded-lg border input-field-premium" required value="">
                </div>

                <div>
                    <label for="categoriaGasto" class="block font-semibold text-sm text-[--muted] mb-2">Tipo de Gasto</label>
                    <select id="categoriaGasto" name="categoria_gasto" class="w-full px-4 py-3 rounded-lg border input-field-premium" required>
                        <option value="" disabled selected>Seleccione la categoría</option>
                        <option>Gastos Administrativos</option>
                        <option>Gastos Operativos</option>
                        <option>Gastos Financieros</option>
                        <option>Otros</option>
                    </select>
                </div>

                <div id="placaContainer" class="hidden">
                    <label for="placa" class="block font-semibold text-sm text-[--muted] mb-2">Marca de placa</label>
                    <input type="text" id="placa" name="placa" placeholder="Ingrese código o placa asociado" class="w-full px-4 py-3 rounded-lg border input-field-premium" value="">
                </div>

                <div class="md:col-span-2 lg:col-span-2">
                    <label for="motivoGasto" class="block font-semibold text-sm text-[--muted] mb-2">Motivo del gasto</label>
                    <select id="motivoGasto" name="motivo_gasto" class="w-full px-4 py-3 rounded-lg border input-field-premium" required>
                        <option value="" disabled selected>Seleccione el motivo específico</option>
                        <option>Material de Oficina</option>
                        <option>Viajes y Viáticos</option>
                        <option>Servicios Básicos (Agua, Luz)</option>
                        <option>Mantenimiento</option>
                        <option>Publicidad y Marketing</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="bg-[--card-bg] rounded-xl p-8 card-shadow-premium">
            <h2 class="flex flex-col sm:flex-row sm:items-center justify-between text-2xl font-extrabold text-[--primary] mb-6 border-b-4 border-[--secondary] pb-3">
                <div class="flex items-center mb-4 sm:mb-0">
                    <i class="bi bi-list-check text-[--primary] mr-3 text-2xl"></i>
                    <span>Detalle de Productos</span>
                </div>
                <button type="button" class="bg-[--accent] text-white font-bold py-3 px-6 rounded-lg shadow-md transition-all duration-200 hover:bg-emerald-600 text-base transform hover:scale-[1.01] hover:shadow-lg" id="agregarItemGastoBtn">
                    <i class="bi bi-plus-circle-fill text-sm mr-2"></i>Añadir Ítem
                </button>
            </h2>
            <div class="overflow-x-auto rounded-lg border border-gray-300">
                <table class="w-full text-sm">
                    <thead class="table-header-premium border-b border-gray-200">
                    <tr>
                        <th class="px-4 py-4 text-left font-extrabold w-[35%]">Descripción del Ítem</th>
                        <th class="px-4 py-4 text-center font-extrabold w-[10%]">Und.</th>
                        <th class="px-4 py-4 text-center font-extrabold w-[10%]">Peso <span class="font-medium text-xs"></span></th>
                        <th class="px-4 py-4 text-center font-extrabold w-[15%]">Cantidad <span class="font-medium text-xs"></span></th>
                        <th class="px-4 py-4 text-center font-extrabold w-[15%]">Precio Unit.<span class="font-medium text-xs"></span></th>
                        <th class="px-4 py-4 text-right font-extrabold w-[15%]">Total</th>
                        <th class="px-4 py-4 w-8"></th>
                    </tr>
                    </thead>
                    <tbody id="bodyItemsGasto" class="divide-y divide-gray-100 bg-white">
                    </tbody>
                </table>
                <p id="emptyTableMessage" class="text-center bg-white text-gray-400 py-8 text-base font-medium">
                    <i class="bi bi-inbox-fill mr-2"></i>No hay ítems registrados. Añada uno para continuar.
                </p>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
            <section class="lg:col-span-3 bg-[--card-bg] rounded-xl p-8 card-shadow-premium">
                <h2 class="flex items-center text-xl font-extrabold text-[--primary] mb-6 border-b-4 border-[--secondary] pb-3">
                    <i class="bi bi-chat-left-text text-[--primary] mr-3 text-xl"></i>Notas y Observaciones
                </h2>
                <textarea id="observacionesGasto" class="w-full px-4 py-3 rounded-lg border input-field-premium text-sm" rows="5" placeholder="Ingrese cualquier detalle adicional, referencia de proyecto o comentarios de auditoría."></textarea>
            </section>

            <section class="lg:col-span-2 summary-card-premium rounded-xl p-8 shadow-xl">
                <h2 class="flex items-center text-xl font-extrabold mb-6 border-b-2 border-[--secondary] pb-3 text-[--secondary]">
                    <i class="bi bi-calculator-fill text-[--secondary] mr-3 text-xl"></i>RESUMEN FINANCIERO
                </h2>
                <div class="space-y-3 text-gray-200">
                    <div class="flex justify-between items-center text-lg border-b border-gray-700 pb-2">
                        <span class="font-light text-base">Total Peso (Kg)</span>
                        <span id="totalPesoGasto" class="font-bold text-xl text-white">0.000</span>
                    </div>

                    <div class="flex justify-between items-center text-lg">
                        <span class="font-light text-base">Subtotal</span>
                        <span id="subtotalGasto" class="font-bold text-xl text-white">S/ 0.00</span>
                    </div>

                    <div class="flex justify-between items-center text-lg border-b border-gray-700 pb-2">
                        <span class="font-light text-base">IGV</span>
                        <span id="igvGasto" class="font-bold text-xl text-white">S/ 0.00</span>
                    </div>

                    <div class="flex flex-col justify-between items-start pt-5">
                        <span class="text-gray-400 uppercase text-sm font-semibold tracking-wider">TOTAL A PAGAR</span>
                        <span id="totalGasto" class="text-[--secondary] text-5xl font-black tracking-widest mt-1">S/ 0.00</span>
                    </div>
                </div>
                <div class="mt-8 space-y-3">
                    <button type="submit" id="guardarGastoBtn" class="bg-[--primary] text-[--secondary] font-extrabold py-3 px-6 rounded-lg w-full flex items-center justify-center space-x-3 text-lg transition-all duration-300 hover:bg-gray-800 shadow-2xl transform hover:scale-[1.02] border-2 border-[--secondary]">
                        <i class="bi bi-clipboard2-check-fill text-xl"></i>
                        <span>REGISTRAR GASTOS</span>
                    </button>
                    <button type="button" id="listaGastosBtn" class="bg-gray-200 text-slate-800 font-semibold py-2 px-6 rounded-lg w-full flex items-center justify-center space-x-2 text-sm transition-all duration-300 hover:bg-gray-300">
                        <i class="bi bi-clock-history"></i>
                        <span>Ver Historial de Gastos</span>
                    </button>
                </div>
            </section>
        </div>
    </form>
</main>

<script src="../../JS/Gastos/gastos.js"></script>
</body>
</html>
