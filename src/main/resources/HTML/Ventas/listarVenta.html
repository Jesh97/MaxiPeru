<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado Completo de Ventas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { padding-top: 20px; background-color: #f8f9fa; }
        .table thead th { background-color: #007bff; color: white; }
        .modal-header { background-color: #007bff; color: white; }
        .tab-content { padding: 15px; border: 1px solid #dee2e6; border-top: none; }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }
        .info-item { background-color: #e9ecef; padding: 10px; border-radius: 5px; }
        .info-item strong { display: block; color: #495057; font-size: 0.9em; margin-bottom: 2px; }
        .loading { text-align: center; font-size: 1.2em; color: #6c757d; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="mb-4 text-center">Listado de Ventas</h1>

    <div id="ventas-list">
        <p class="loading">Cargando datos de ventas...</p>
    </div>
</div>

<div class="modal fade" id="detallesModal" tabindex="-1" aria-labelledby="detallesModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="detallesModalLabel">Detalles de la Venta</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                <div id="modal-venta-info" class="mb-3">
                </div>

                <ul class="nav nav-tabs" id="ventaTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="detalles-tab" data-bs-toggle="tab" data-bs-target="#detalles-content" type="button" role="tab">Artículos Vendidos</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="guia-tab" data-bs-toggle="tab" data-bs-target="#guia-content" type="button" role="tab">Guía de Remisión</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="descuentos-tab" data-bs-toggle="tab" data-bs-target="#descuentos-content" type="button" role="tab">Descuentos Globales</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="conformidad-tab" data-bs-toggle="tab" data-bs-target="#conformidad-content" type="button" role="tab">Conformidad</button>
                    </li>
                </ul>

                <div class="tab-content" id="ventaTabsContent">
                    <div class="tab-pane fade show active" id="detalles-content" role="tabpanel" tabindex="0"></div>
                    <div class="tab-pane fade" id="guia-content" role="tabpanel" tabindex="0"></div>
                    <div class="tab-pane fade" id="descuentos-content" role="tabpanel" tabindex="0"></div>
                    <div class="tab-pane fade" id="conformidad-content" role="tabpanel" tabindex="0"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        fetchVentas();
    });

    function safe(value) {
        if (typeof value === 'object' && value !== null && value.value !== undefined) {
             return value.value;
        }
        return value !== null && value !== undefined && value !== '' ? value : '-';
    }

    async function fetchVentas() {
        try {
            const response = await fetch('/ListarVentas');

            if (!response.ok) {
                throw new Error(`Error HTTP! Estado: ${response.status}`);
            }

            const ventas = await response.json();
            renderVentas(ventas);

            window.showVentaDetailsModal = showVentaDetailsModal;

        } catch (error) {
            console.error("Error al obtener las ventas:", error);
            document.getElementById('ventas-list').innerHTML = `<p class="alert alert-danger">Error al cargar las ventas: ${error.message}</p>`;
        }
    }

    function renderVentas(ventas) {
        const listContainer = document.getElementById('ventas-list');

        if (ventas.length === 0) {
            listContainer.innerHTML = '<p class="alert alert-info">No hay ventas registradas.</p>';
            return;
        }

        let html = `
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID Venta</th>
                            <th>Comprobante</th>
                            <th>Cliente (Razón Social)</th>
                            <th>Fecha Emisión</th>
                            <th>Total Final</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        ventas.forEach(venta => {
            const ventaJson = JSON.stringify(venta).replace(/"/g, '&quot;');

            html += `
                <tr>
                    <td>${safe(venta.id_venta)}</td>
                    <td>${safe(venta.tipo_comprobante)} ${safe(venta.serie)}-${safe(venta.correlativo)}</td>
                    <td>${safe(venta.cliente.razon_social)}</td>
                    <td>${safe(venta.fecha_emision)}</td>
                    <td>**${safe(venta.total_final)}** ${safe(venta.moneda)}</td>
                    <td>${safe(venta.estado_venta)}</td>
                    <td>
                        <button type="button" class="btn btn-primary btn-sm"
                            onclick='showVentaDetailsModal(${ventaJson})'>
                            Ver Detalles
                        </button>
                    </td>
                </tr>
            `;
        });

        html += `
                    </tbody>
                </table>
            </div>
        `;
        listContainer.innerHTML = html;
    }

    function showVentaDetailsModal(venta) {
        document.getElementById('detallesModalLabel').textContent = `Detalles de la Venta ${safe(venta.serie)}-${safe(venta.correlativo)}`;

        const mainInfoHtml = `
            <h5>Información de la Venta</h5>
            <div class="info-grid">
                <div class="info-item"><strong>ID/Comprobante:</strong> ${safe(venta.id_venta)} / ${safe(venta.tipo_comprobante)}</div>
                <div class="info-item"><strong>Cliente:</strong> ${safe(venta.cliente.razon_social)} (${safe(venta.cliente.n_documento)})</div>
                <div class="info-item"><strong>Total Final:</strong> **${safe(venta.total_final)}** ${safe(venta.moneda)}</div>
                <div class="info-item"><strong>Estado:</strong> ${safe(venta.estado_venta)}</div>
                <div class="info-item"><strong>Fecha Emisión:</strong> ${safe(venta.fecha_emision)}</div>
                <div class="info-item"><strong>Aplica IGV:</strong> ${venta.aplica_igv ? 'Sí' : 'No'}</div>
            </div>
        `;
        document.getElementById('modal-venta-info').innerHTML = mainInfoHtml;

        document.getElementById('detalles-content').innerHTML = buildDetallesTable(venta.detalles);
        document.getElementById('guia-content').innerHTML = buildGuiaTransporte(venta.guia_transporte);
        document.getElementById('descuentos-content').innerHTML = buildDescuentosGlobales(venta.descuentos_globales);
        document.getElementById('conformidad-content').innerHTML = buildConformidad(venta.conformidad);

        const modal = new bootstrap.Modal(document.getElementById('detallesModal'));
        modal.show();

        const firstTab = new bootstrap.Tab(document.getElementById('detalles-tab'));
        firstTab.show();
    }

    function buildDetallesTable(detalles) {
        let html = `<h5>Detalles de Artículos (${detalles.length})</h5>`;
        if (detalles.length === 0) return html + '<p class="alert alert-info">Esta venta no tiene detalles de artículos.</p>';

        html += `
            <div class="table-responsive">
                <table class="table table-bordered table-sm">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Artículo (Código)</th>
                            <th>Cantidad</th>
                            <th>P. Unitario</th>
                            <th>Subtotal</th>
                            <th>Total Detalle</th>
                            <th>Lotes Consumidos</th>
                            <th>Descuentos Item</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        detalles.forEach(detalle => {
            const lotesInfo = detalle.lotes_consumidos.map(l =>
                `Lote: ${l.codigo_lote} (${l.cantidad_consumida} Uds), Vence: ${safe(l.fecha_vencimiento)}`
            ).join('<br>');

            const descuentosItemInfo = detalle.descuentos_item.map(d =>
                `Motivo: ${d.motivo}, Valor: ${d.valor} (${d.tipo_valor})`
            ).join('<br>');

            html += `
                <tr>
                    <td>${safe(detalle.id_detalle)}</td>
                    <td>${safe(detalle.articulo.descripcion)} (${safe(detalle.articulo.codigo)}) - ${safe(detalle.articulo.unidad_medida)}</td>
                    <td>${safe(detalle.cantidad)}</td>
                    <td>${safe(detalle.precio_unitario)}</td>
                    <td>${safe(detalle.subtotal_detalle)}</td>
                    <td>**${safe(detalle.total_detalle)}**</td>
                    <td><small>${lotesInfo || 'N/A'}</small></td>
                    <td><small>${descuentosItemInfo || 'N/A'}</small></td>
                </tr>
            `;
        });

        html += '</tbody></table></div>';
        return html;
    }

    function buildGuiaTransporte(guia) {
        let html = '<h5>Guía de Remisión (Guía de Transporte)</h5>';
        if (guia === null) return html + '<p class="alert alert-info">No hay Guía de Remisión asociada a esta venta.</p>';

        return html + `
            <h6>Datos Generales</h6>
            <div class="info-grid mb-3">
                <div class="info-item"><strong>Serie/Correlativo:</strong> ${safe(guia.serie_guia_transporte)}-${safe(guia.correlativo_guia_transporte)}</div>
                <div class="info-item"><strong>Modalidad de Transporte:</strong> ${safe(guia.modalidad_transporte)}</div>
                <div class="info-item"><strong>Fecha de Traslado:</strong> ${safe(guia.fecha_traslado)}</div>
                <div class="info-item"><strong>Peso Total (Guía):</strong> ${safe(guia.peso_guia)}</div>
            </div>

            <h6>Datos de la Empresa Transportista</h6>
            <div class="info-grid mb-3">
                <div class="info-item"><strong>RUC:</strong> ${safe(guia.ruc_empresa)}</div>
                <div class="info-item"><strong>Razón Social:</strong> ${safe(guia.razon_social_empresa)}</div>
            </div>

            <h6>Puntos de Traslado y Conductor</h6>
            <div class="info-grid">
                <div class="info-item"><strong>Punto de Partida:</strong> ${safe(guia.punto_partida)}</div>
                <div class="info-item"><strong>Punto de Llegada:</strong> ${safe(guia.punto_llegada)}</div>
                <div class="info-item"><strong>Conductor (DNI):</strong> ${safe(guia.dni_conductor)}</div>
                <div class="info-item"><strong>Nombre Conductor:</strong> ${safe(guia.nombre_conductor)}</div>
            </div>
        `;
    }

    function buildDescuentosGlobales(descuentos) {
        let html = '<h5>Descuentos Globales</h5>';
        if (descuentos.length === 0) return html + '<p class="alert alert-info">No hay descuentos globales registrados para esta venta.</p>';

        html += `
            <div class="table-responsive">
                <table class="table table-bordered table-sm">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Motivo</th>
                            <th>Tipo Valor</th>
                            <th>Valor</th>
                            <th>Tasa IGV</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        descuentos.forEach(d => {
            html += `
                <tr>
                    <td>${safe(d.id_descuento)}</td>
                    <td>${safe(d.motivo)}</td>
                    <td>${safe(d.tipo_valor)}</td>
                    <td>${safe(d.valor)}</td>
                    <td>${safe(d.tasa_igv)}</td>
                </tr>
            `;
        });

        html += '</tbody></table></div>';
        return html;
    }

    function buildConformidad(conformidad) {
        let html = '<h5>Conformidad de Entrega</h5>';
        if (conformidad === null) return html + '<p class="alert alert-warning">No hay registro de conformidad de entrega para esta venta.</p>';

        return html + `
            <div class="info-grid">
                <div class="info-item"><strong>ID Conformidad:</strong> ${safe(conformidad.id_conformidad)}</div>
                <div class="info-item"><strong>Nombre de Quien Confirma:</strong> ${safe(conformidad.nombre_cliente_confirma)}</div>
                <div class="info-item"><strong>DNI de Quien Confirma:</strong> ${safe(conformidad.dni_cliente_confirma)}</div>
                <div class="info-item"><strong>Tipo de Entrega:</strong> ${safe(conformidad.tipo_entrega)}</div>
            </div>
        `;
    }
</script>
</body>
</html>
