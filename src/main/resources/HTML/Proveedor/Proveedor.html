<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proveedores — Panel Corporativo Premium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../CSS/Proveedor/proveedor.css" rel="stylesheet">
</head>
<body class="min-h-screen p-2 sm:p-4">

<div class="container-premium w-full mx-auto mt-2 mb-6 p-4 sm:p-6 rounded-2xl shadow-lg transition duration-500">

    <div class="flex flex-col sm:flex-row justify-between items-center mb-6 border-b border-gray-200 pb-3">
        <h1 class="text-2xl sm:text-3xl font-extrabold text-blue-700 mb-2 sm:mb-0">
            Gestión de Proveedores
        </h1>
        <button class="btn-premium-primary flex items-center text-sm px-4 py-2 rounded-lg font-bold w-full sm:w-auto" onclick="abrirModalNuevo()">
            <i class="bi bi-building-add mr-2"></i> Nuevo Proveedor
        </button>
    </div>

    <div class="relative flex mb-6 shadow-md rounded-lg border border-gray-300" id="searchContainer">
        <input type="search" id="buscarInput"
               class="form-control-premium w-full p-2.5 border-none focus:ring-0 focus:outline-none placeholder-gray-500 bg-white rounded-l-lg z-20"
               placeholder="Buscar proveedor por RUC, Razón Social, Correo o Teléfono...">

        <button class="bg-blue-600 hover:bg-blue-700 text-white p-2.5 transition duration-300 rounded-r-lg z-20" onclick="buscarProveedores()">
            <i class="bi bi-search text-base"></i>
        </button>

        <div id="sugerenciasDropdown" class="absolute top-full left-0 right-0 z-40 bg-white border border-gray-300 rounded-b-lg shadow-xl max-h-60 overflow-y-auto hidden">
        </div>
    </div>

    <div class="shadow-xl rounded-xl overflow-x-auto border border-gray-200">
        <table class="table align-middle mb-0 w-full table-light-premium text-xs sm:text-sm">
            <thead class="table-light-premium">
            <tr>
                <th class="text-left whitespace-nowrap">RUC</th>
                <th class="text-left whitespace-nowrap">Razón Social</th>
                <th class="text-left hidden sm:table-cell whitespace-nowrap">Correo</th>
                <th class="text-left hidden md:table-cell whitespace-nowrap">Teléfono</th>
                <th class="text-left hidden lg:table-cell whitespace-nowrap">Ciudad</th>
                <th class="text-left hidden xl:table-cell whitespace-nowrap">Dirección</th>
                <th class="text-center whitespace-nowrap">Acciones</th>
            </tr>
            </thead>
            <tbody id="proveedorTableBody">
            </tbody>
        </table>
    </div>

    <nav class="mt-6" aria-label="Paginación de proveedores">
        <ul class="flex justify-center space-x-2" id="paginacion"></ul>
    </nav>
</div>

<div class="modal-container fixed inset-0 z-50 hidden opacity-0 items-center justify-center p-4" id="proveedorModal" role="dialog" aria-modal="true">
    <div class="relative w-full max-w-3xl mx-auto transform transition-all duration-300">
        <div class="modal-content-premium rounded-xl shadow-3xl">
            <form id="proveedorForm" novalidate>
                <div class="bg-blue-600 text-white px-5 py-3 rounded-t-xl flex justify-between items-center">
                    <h5 class="modal-title font-extrabold text-lg" id="proveedorModalLabel">Registrar Proveedor</h5>
                    <button type="button" class="text-white text-2xl opacity-100 hover:text-gray-200 transition" onclick="ocultarModal()" aria-label="Cerrar">
                        &times;
                    </button>
                </div>
                <div class="modal-body px-5 py-5">
                    <input type="hidden" id="id">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">

                        <div class="mb-3">
                            <label for="ruc" class="block text-blue-600 font-medium mb-1 text-xs">RUC:</label>
                            <input type="text" class="form-control-premium w-full rounded-md p-2" id="ruc" required>
                        </div>

                        <div class="mb-3">
                            <label for="razonSocial" class="block text-blue-600 font-medium mb-1 text-xs">Razón Social:</label>
                            <input type="text" class="form-control-premium w-full rounded-md p-2" id="razonSocial" required>
                        </div>

                        <div class="mb-3">
                            <label for="correo" class="block text-blue-600 font-medium mb-1 text-xs">Correo Electrónico:</label>
                            <input type="email" class="form-control-premium w-full rounded-md p-2" id="correo">
                        </div>

                        <div class="mb-3">
                            <label for="telefono" class="block text-blue-600 font-medium mb-1 text-xs">Teléfono:</label>
                            <input type="tel" class="form-control-premium w-full rounded-md p-2" id="telefono">
                        </div>

                        <div class="mb-3">
                            <label for="ciudad" class="block text-blue-600 font-medium mb-1 text-xs">Ciudad:</label>
                            <input type="text" class="form-control-premium w-full rounded-md p-2" id="ciudad" required>
                        </div>

                        <div class="mb-3">
                            <label for="direccion" class="block text-blue-600 font-medium mb-1 text-xs">Dirección:</label>
                            <input type="text" class="form-control-premium w-full rounded-md p-2" id="direccion" required>
                        </div>

                    </div>
                </div>
                <div class="flex justify-end space-x-3 px-5 py-3 border-t border-gray-200 rounded-b-xl">
                    <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-4 text-sm rounded-lg transition duration-300">
                        <i class="bi bi-save mr-2"></i>Guardar
                    </button>
                    <button type="button" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-4 text-sm rounded-lg transition duration-300" onclick="ocultarModal()">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="../../JS/proveedor/proveedor.js"></script>
</body>
</html>
