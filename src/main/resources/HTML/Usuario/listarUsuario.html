<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="../../CSS/Usuario/usuario.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="titulo">Usuarios</h1>
        <a href="../Usuario/registrarUsuario.html" class="btn btn-success">
            <i class="fas fa-user-plus"></i> Crear Usuario
        </a>
    </div>

    <table class="table table-bordered table-hover table-striped shadow-sm" id="tablaUsuarios">
        <thead class="table-dark">
        <tr>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Username</th>
            <th>Rol</th>
            <th>Estado</th>
            <th>Acceso Irrestricto</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div class="modal fade" id="modalActividades" tabindex="-1" aria-labelledby="modalActividadesLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalActividadesLabel"><i class="fas fa-chart-line"></i> Actividades del Usuario</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                <div class="row mb-3">
                    <div class="col-md-5">
                        <label for="fechaInicio" class="form-label">Desde:</label>
                        <input type="date" class="form-control" id="fechaInicio">
                    </div>
                    <div class="col-md-5">
                        <label for="fechaFin" class="form-label">Hasta:</label>
                        <input type="date" class="form-control" id="fechaFin">
                    </div>
                    <div class="col-md-2 d-flex align-items-end gap-1">
                        <button class="btn btn-primary w-100" onclick="filtrarActividadesPorFecha()" title="Filtrar">
                            <i class="fa fa-filter"></i>
                        </button>
                        <button class="btn btn-secondary w-100" onclick="limpiarFiltroFechas()" title="Limpiar Filtro">
                            <i class="fas fa-broom"></i>
                        </button>
                    </div>
                </div>

                <table class="table table-bordered table-hover table-striped">
                    <thead class="table-light">
                    <tr>
                        <th>Tipo</th>
                        <th>Descripción</th>
                        <th>Fecha</th>
                    </tr>
                    </thead>
                    <tbody id="tablaActividadesBody"></tbody>
                </table>
            </div>
            <div class="modal-footer d-flex justify-content-between flex-wrap">
                <div id="paginacionActividades" class="mb-2"></div>
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../JS/usuario/usuario.js"></script>
</body>
</html>
