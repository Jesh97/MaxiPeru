<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Inventario Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../../CSS/Producto/listarProducto.css">
    <style>
        /* Estilos base (Mantener la estética) */
        .filter-group {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .btn-add-catalog {
            background-color: #38A169;
            color: white;
            padding: 8px 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s;
            font-weight: 600;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            height: 38px;
        }

        .btn-add-catalog:hover {
            background-color: #2F855A;
            transform: translateY(-1px);
        }
        .btn-add-catalog i {
            font-size: 14px;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        #marcaModal .modal-content,
        #categoriaModal .modal-content,
        #tipoModal .modal-content {
            max-width: 450px;
            width: 90%;
            padding: 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        #marcaModal h2,
        #categoriaModal h2,
        #tipoModal h2 {
            font-size: 1.5rem;
        }

        .form-actions {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
        }

        /* --- Estilos para la nueva ubicación y botones de exportación --- */

        .pagination-controls {
            display: flex;
            /* IMPORTANTE: justify-content: space-between para separar los elementos a los extremos */
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 10px 0;
            flex-wrap: wrap;
            gap: 10px; /* Espacio entre los bloques en móvil */
        }

        .export-controls {
            display: flex;
            gap: 10px;
            /* Ordena los botones de exportación a la derecha */
            margin-left: auto;
            flex-wrap: wrap;
        }

        .btn-export-csv, .btn-export-excel {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.1s;
            line-height: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .btn-export-csv {
            background-color: #3182CE; /* Azul para CSV */
            color: white;
        }
        .btn-export-csv:hover {
            background-color: #2C5282;
            transform: translateY(-1px);
        }

        .btn-export-excel {
            background-color: #38A169; /* Verde para Excel */
            color: white;
        }
        .btn-export-excel:hover {
            background-color: #2F855A;
            transform: translateY(-1px);
        }

        /* Contenedor de paginación para agrupar Prev/Info/Next */
        .page-controls-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .controls-and-search {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
            }
            .controls-buttons {
                flex-direction: column;
                gap: 10px;
            }
            .controls-buttons button {
                width: 100%;
            }
            /* En móvil, apilar los controles de paginación y exportación */
            .pagination-controls {
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }
            .page-controls-container {
                flex-wrap: wrap;
                justify-content: center;
            }
            .export-controls {
                margin-left: 0;
                justify-content: center;
                width: 100%;
                margin-top: 10px; /* Separación después de la paginación */
            }
            .export-controls button {
                flex-grow: 1;
            }
        }
    </style>
</head>

<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
</div>

<div class="container">
    <h1>Gestión de Inventario de Artículos</h1>

    <div class="controls-and-search">
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="busquedaGeneral" placeholder="Buscar por Código o Descripción..." oninput="renderSugerencias(this.value)">
            <div id="sugerencias" class="sugerencias-dropdown"></div>
        </div>

        <div class="controls-buttons">
            <button class="btn-primary" onclick="abrirFormulario()">+ Agregar Nuevo Artículo</button>
            <button class="btn-info" onclick="aplicarFiltros()">Actualizar Lista</button>
        </div>
    </div>

    <div class="filters">
        <div class="filter-group">
            <label>Marca:
                <select id="filtroMarca" onchange="aplicarFiltros()"><option value="">Todas</option></select>
            </label>
            <button class="btn-add-catalog" title="Agregar Nueva Marca" onclick="abrirModalMarca()"><i class="fas fa-plus"></i></button>
        </div>

        <div class="filter-group">
            <label>Categoría:
                <select id="filtroCategoria" onchange="aplicarFiltros()"><option value="">Todas</option></select>
            </label>
            <button class="btn-add-catalog" title="Agregar Nueva Categoría" onclick="abrirModalCategoria()"><i class="fas fa-plus"></i></button>
        </div>

        <div class="filter-group">
            <label>Tipo:
                <select id="filtroTipo" onchange="aplicarFiltros()"><option value="">Todos</option></select>
            </label>
            <button class="btn-add-catalog" title="Agregar Nuevo Tipo de Producto" onclick="abrirModalTipo()"><i class="fas fa-plus"></i></button>
        </div>
    </div>

    <div class="table-container">
        <table id="tabla-articulos">
            <thead>
            <tr>
                <th>Código</th>
                <th>Descripción</th>
                <th class="data-center">Stock</th>
                <th class="data-center">Precio (S/)</th>
                <th class="data-center">Peso (Kg)</th>
                <th class="data-unit">Unidad</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <!-- CONTROLES DE EXPORTACIÓN Y PAGINACIÓN AL FINAL -->
    <!-- NOTA: El CSS 'justify-content: space-between' asegura que 'page-controls-container'
         y 'export-controls' se separen a los extremos. -->
    <div id="paginacion-controles" class="pagination-controls">
        <!-- El JS llenará el 'page-controls-container' aquí -->
        <div class="page-controls-container">
            <!-- Botones de página e información van aquí -->
        </div>

        <!-- Botones de Exportación (Van al extremo derecho gracias al CSS) -->
        <div class="export-controls">
            <button class="btn-export-csv" onclick="exportarDatos('csv')"><i class="fas fa-file-csv"></i> Exportar CSV</button>
            <button class="btn-export-excel" onclick="exportarDatos('xlsx')"><i class="fas fa-file-excel"></i> Exportar Excel</button>
        </div>
    </div>
</div>

<div id="articuloModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarFormulario()">&times;</span>
        <div class="modal-header-gradient" id="articuloModalHeader">
            <h2>Formulario de Artículo</h2>
        </div>
        <div class="modal-body">
            <form id="articuloForm">
                <input type="hidden" id="idProducto" name="id_producto">

                <div class="form-grid">
                    <div class="form-group">
                        <label for="codigo">Código:</label>
                        <input type="text" id="codigo" name="codigo" required>
                    </div>
                    <div class="form-group">
                        <label for="descripcion">Descripción:</label>
                        <input type="text" id="descripcion" name="descripcion" required>
                    </div>
                    <div class="form-group">
                        <label for="cantidad">Stock (Cantidad):</label>
                        <input type="number" id="cantidad" name="cantidad" required min="0">
                    </div>
                    <div class="form-group">
                        <label for="precioUnitario">Precio Unitario (S/):</label>
                        <input type="number" id="precioUnitario" name="precio_unitario" step="0.01" required min="0">
                    </div>
                    <div class="form-group">
                        <label for="pesoUnitario">Peso Unitario (kg):</label>
                        <input type="number" id="pesoUnitario" name="peso_unitario" step="0.001" required min="0">
                    </div>
                    <div class="form-group">
                        <label for="densidad">Densidad:</label>
                        <input type="number" id="densidad" name="densidad" step="0.001" required min="0">
                    </div>
                    <div class="form-group">
                        <label for="aroma">Aroma:</label>
                        <input type="text" id="aroma" name="aroma">
                    </div>
                    <div class="form-group">
                        <label for="color">Color:</label>
                        <input type="text" id="color" name="color">
                    </div>

                    <div class="form-group">
                        <label for="idMarca">Marca:</label>
                        <select id="idMarca" name="id_marca" required></select>
                    </div>
                    <div class="form-group">
                        <label for="idCategoria">Categoría:</label>
                        <select id="idCategoria" name="id_categoria" required></select>
                    </div>
                    <div class="form-group">
                        <label for="idUnidad">Unidad de Medida:</label>
                        <select id="idUnidad" name="id_unidad" required></select>
                    </div>
                    <div class="form-group">
                        <label for="idTipoArticulo">Tipo de Artículo:</label>
                        <select id="idTipoArticulo" name="id_tipo_articulo" required></select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Guardar Artículo</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="detallesModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="document.getElementById('detallesModal').style.display='none';">&times;</span>
        <div class="modal-header-gradient modal-header-details">
            <h2>Detalles Secundarios</h2>
        </div>
        <div class="modal-body">
            <div id="detallesContent">

            </div>
        </div>
    </div>
</div>

<div id="messageModal" class="modal">
    <div class="modal-content message-content">
        <span class="close" onclick="document.getElementById('messageModal').style.display='none';">&times;</span>
        <div class="modal-header-gradient modal-header-message">
            <h3 id="messageTitle"></h3>
        </div>
        <div class="modal-body">
            <p id="messageText"></p>
            <div class="message-actions">
                <button id="messageOkBtn" class="btn-primary"><i class="fas fa-check"></i> Aceptar</button>
                <button id="messageCancelBtn" class="btn-delete" style="display:none;"><i class="fas fa-times"></i> Cancelar</button>
            </div>
        </div>
    </div>
</div>

<div id="marcaModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModalMarca()">&times;</span>
        <div class="modal-header-gradient">
            <h2>Agregar Nueva Marca</h2>
        </div>
        <div class="modal-body">
            <form id="marcaForm" onsubmit="guardarMarca(event)">
                <div class="form-group">
                    <label for="nombreMarca">Nombre de la Marca:</label>
                    <input type="text" id="nombreMarca" name="nombre" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Guardar Marca</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="categoriaModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModalCategoria()">&times;</span>
        <div class="modal-header-gradient">
            <h2>Agregar Nueva Categoría</h2>
        </div>
        <div class="modal-body">
            <form id="categoriaForm" onsubmit="guardarCategoria(event)">
                <div class="form-group">
                    <label for="nombreCategoria">Nombre de la Categoría:</label>
                    <input type="text" id="nombreCategoria" name="nombre" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Guardar Categoría</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="tipoModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModalTipo()">&times;</span>
        <div class="modal-header-gradient">
            <h2>Agregar Nuevo Tipo de Artículo</h2>
        </div>
        <div class="modal-body">
            <form id="tipoForm" onsubmit="guardarTipo(event)">
                <div class="form-group">
                    <label for="nombreTipo">Nombre del Tipo de Artículo:</label>
                    <input type="text" id="nombreTipo" name="nombre" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Guardar Tipo</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="../../JS/Producto/listarProducto.js"></script>
</body>
</html>
