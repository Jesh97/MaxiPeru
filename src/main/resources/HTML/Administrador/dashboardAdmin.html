<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MaxiPerú | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="../../CSS/Dashboard/dashboard.css" rel="stylesheet" />
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 sidebar d-flex flex-column align-items-center bg-dark text-white vh-100">
            <div class="logo text-center mb-4 mt-3">
                <img src="../../img/logo.png" alt="Logo MaxiPerú" class="img-fluid w-100 px-3"/>
            </div>
            <div class="nav flex-column w-100">
                <a href="#" class="nav-link text-white active" data-url="../../Dashboard/home.html" data-title="Panel de Control"><i class="fas fa-chart-line me-2"></i>Dashboard</a>
                <a href="#" class="nav-link text-white" data-url="../Producto/Producto.html" data-title="Productos"><i class="fas fa-box-open me-2"></i>Productos</a>
                <a href="#" class="nav-link text-white" data-url="../Insumo/Insumo.html" data-title="Insumos"><i class="fas fa-flask me-2"></i>Insumos</a>
                <a href="../Compras/compra.html"><i class="fas fa-shopping-cart me-2"></i>Compras</a>
                <a href="#" class="nav-link text-white" data-url="../Proveedor/Proveedor.html" data-title="Proveedores"><i class="fas fa-truck me-2"></i>Proveedores</a>
                <a href="#" class="nav-link text-white" data-url="../Cliente/Clientes.html" data-title="Clientes"><i class="fas fa-users me-2"></i>Clientes</a>
                <a href="#" class="nav-link text-white" data-url="../Produccion/Produccion.html" data-title="Producción"><i class="fas fa-industry me-2"></i>Producción</a>
                <a href="#" class="nav-link text-white" data-url="../Usuario/listarUsuario.html" data-title="Usuarios"><i class="fas fa-user-cog me-2"></i>Usuarios</a>
            </div>
        </nav>

        <main class="col-md-10">
            <div class="topbar d-flex justify-content-between align-items-center px-4 py-3 border-bottom">
                <h2 class="m-0" id="titulo-pagina">Bienvenidos</h2>
                <form action="/cerrarSesion" method="post">
                    <button type="submit" class="btn btn-logout">
                        <i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión
                    </button>
                </form>
            </div>

            <div id="contenido-dinamico" class="p-4">
                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="card text-white bg-primary">
                            <div class="card-body">
                                <h5 class="card-title"><i class="fas fa-box"></i> Productos en Stock</h5>
                                <h3 class="card-text" id="productosStock">...</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-success">
                            <div class="card-body">
                                <h5 class="card-title"><i class="fas fa-truck"></i> Proveedores</h5>
                                <h3 class="card-text" id="proveedoresCount">...</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-warning">
                            <div class="card-body">
                                <h5 class="card-title"><i class="fas fa-shopping-cart"></i> Órdenes</h5>
                                <h3 class="card-text" id="ordenesCount">...</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-5">
                    <h4 class="mb-4">Resumen General</h4>
                    <canvas id="graficoInventario" height="120"></canvas>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../../JS/login/dashboard.js"></script>
</body>
</html>
